<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Hello, world!</title>
</head>

<body>

    <div class="container my-4">
        <h1 class="text-center">Contact Us</h1>

        <div class="border border-primary rounded py-5 px-5">
            <form class="bg-color-sucess" method="post" name="google-sheet">
                <div class="mb-3">
                    <label for="exampleInputText" class="form-label">Enter Hospital / Medical Shop Name</label>
                    <input type="text" class="form-control" id="exampleInputText" aria-describedby="emailHelp"
                        name="hospital">
                </div>
                <div class="mb-3">
                    <label for="exampleInputText1" class="form-label">Enter your Name</label>
                    <input type="text" class="form-control" id="exampleInputText1" name="name">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlTextarea1" class="form-label">Enter full Postal Address</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" name="address"></textarea>
                </div>
                <div class="mb-3">
                    <label for="exampleInputNumber" class="form-label">Enter Phone Number</label>
                    <input type="text" class="form-control" id="exampleInputNumber" name="phone">
                </div>
                <div class="mb-3">
                    <label for="exampleInputNumber1" class="form-label">Enter your Whatsapp Number</label>
                    <input type="text" class="form-control" id="exampleInputNumber1" name="whatsapp">
                </div>
                <input type="submit" name="submit" value="submit"
                    class="submit position-absolute start-50 translate-middle-x">
            </form>
        </div>
    </div>




    <!-- Separate Popper and Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>


    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzlNOLtS07LJ7-KZaD3rUEg7iRU8MuGzvwXbPT_iWzw4at9VdDLg3InXfarHEVc5KVw/exec'
        const form = document.forms['google-sheet']

        form.addEventListener('submit', e => {
            e.preventDefault()
            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => alert("Thanks for Contacting us..! We Will Contact You Soon..."))
                .catch(error => console.error('Error!', error.message))
        })
    </script>


</body>

</html>
